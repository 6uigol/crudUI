<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Produtos</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body data-entity="produtos" data-id-field="id_produto">
  <div class="container">
    <div class="nav">
      <a href="/index.html">Home</a>
      <a href="/produtos.html">Produtos</a>
      <a href="/quartos.html">Quartos</a>
      <a href="/checkin.html">Check-in</a>
      <a href="/checkout.html">Check-out</a>
    </div>

    <div class="card">
      <h1>Cadastro de Produtos (tb_cad_produto)</h1>
      <p class="small">Conexão e credenciais em <strong>config.js</strong> na raiz.</p>
      <h3 id="formTitle">Novo cadastro</h3>
      <form id="crudForm">
        <input type="hidden" id="editId" name="editId" />
        <div class="row">
          <div><label>Nome do Produto</label><input name="nome_produto" required /></div>
          <div><label>Descrição</label><input name="descricao" /></div>
          <div><label>Preço</label><input name="preco" type="number" step="0.01" required /></div>
          <div><label>Estoque</label><input name="estoque" type="number" required /></div>
        </div>
        <br />
        <button class="btn-primary" type="submit">Salvar (Incluir/Editar)</button>
      </form>
    </div>

    <div class="card">
      <div class="search-group">
        <span class="search-icon">🔍</span>
        <input id="searchInput" placeholder="Pesquisar na tabela (SELECT com LIKE)" />
        <button id="btnSearch" class="btn-secondary" type="button">Pesquisar</button>
        <button id="btnClear" class="btn-secondary" type="button">Limpar</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Nome</th><th>Descrição</th><th>Preço</th><th>Estoque</th><th>Ações</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
